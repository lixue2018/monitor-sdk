# 推送标签 v*.*.* 时自动构建并发布 @lixue2018/monitorx-core、@lixue2018/monitorx-vue
name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      - name: Publish @lixue2018/monitorx-core
        run: npm publish -w @lixue2018/monitorx-core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @lixue2018/monitorx-vue
        run: npm publish -w @lixue2018/monitorx-vue
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
